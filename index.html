// This is a real, free, public sports data feed with no API key, no rate
// limit problems, and no LLM cost — but a plain browser fetch() to it is
// blocked by Claude.ai's artifact sandbox network policy. It works fine from

// ESPN's scoreboard without a date only returns today's matches.
// We fetch multiple specific date windows in parallel to cover the entire tournament,
// then deduplicate by event ID. This recovers completed matches from any point in time.
const ESPN_BASE = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?limit=100&dates=';
const ESPN_DATE_WINDOWS = ['20260611-20260616',
// Group stage round 1
'20260617-20260622',
// Group stage round 2
'20260623-20260627',
// Group stage round 3
'20260628-20260719' // Knockout rounds
];
const ESPN_STANDINGS_URL = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/standings';
const KO_DATE_RANGES = {
  R32:   ['2026-06-28T00:00:00', '2026-07-04T06:00:00'], // ends before first R16 kick-off
  R16:   ['2026-07-04T06:00:00', '2026-07-07T23:59:59'],
  QF:    ['2026-07-09T00:00:00', '2026-07-11T23:59:59'],
  SF:    ['2026-07-14T00:00:00', '2026-07-15T23:59:59'],
  Third: ['2026-07-18T00:00:00', '2026-07-18T23:59:59'],
  Final: ['2026-07-19T00:00:00', '2026-07-19T23:59:59'],

// Group number (1-12) → letter (A-L) for ESPN APIs that use numeric group identifiers
const GROUP_NUM_TO_LETTER = {
  1: 'A',
  2: 'B',
  3: 'C',
  4: 'D',
  5: 'E',
  6: 'F',
  7: 'G',
  8: 'H',
  9: 'I',
  10: 'J',
  11: 'K',
  12: 'L'

function getRoundForDate(isoDate) {
  // Use 19-char slice (YYYY-MM-DDTHH:MM:SS) so time-based range boundaries work.
  // Handles both full ISO ('2026-07-04T17:00:00Z') and date-only ('2026-07-04') strings.
  const raw = (isoDate || '').replace('Z', '');
  const d = raw.length >= 19 ? raw.slice(0, 19) : raw.slice(0, 10) + 'T12:00:00';
  for (const [round, [start, end]] of Object.entries(KO_DATE_RANGES)) {
    if (d >= start && d <= end) return round;
  }

}
function parseESPNEvents(json) {
  const events = json && json.events || [];
  return events.map(ev => {
    const comp = ev.competitions && ev.competitions[0] || {};
    const statusType = comp.status && comp.status.type || {};
    const competitors = comp.competitors || [];
    const home = competitors.find(c => c.homeAway === 'home') || {};
    const away = competitors.find(c => c.homeAway === 'away') || {};

    // Try multiple formats ESPN uses for group identification:
    // "Group A" (letter), "Group 1"–"Group 12" (number), "Group Stage - Group A", etc.
    const note = comp.altGameNote || comp.notes?.[0]?.text || ev.name || '';
    const letterMatch = /Group\s+([A-L])\b/i.exec(note);
    const numberMatch = /Group\s+(\d{1,2})\b/i.exec(note);
    const group = letterMatch ? letterMatch[1].toUpperCase() : numberMatch ? GROUP_NUM_TO_LETTER[parseInt(numberMatch[1])] || null : null;

    // Also detect via date range if the note doesn't specify — group stage is Jun 11-27
    const matchDate = (ev.date || '').slice(0, 10);
    const isGroupDate = matchDate >= '2026-06-11' && matchDate <= '2026-06-27';
    const stage = group ? 'group' : isGroupDate && !getRoundForDate(matchDate) ? 'group' : 'knockout';
    const round = stage === 'knockout' ? getRoundForDate(ev.date || '') : null;
    const t1 = normalizeTeam(home.team && home.team.displayName);
    const t2 = normalizeTeam(away.team && away.team.displayName);
    const venue = comp.venue || {};
    const city = venue.address && (venue.address.city || venue.address.state) || venue.city || null;
    const p1 = home.shootoutScore !== undefined && home.shootoutScore !== null && home.shootoutScore !== '' ? Number(home.shootoutScore) : null;
    const p2 = away.shootoutScore !== undefined && away.shootoutScore !== null && away.shootoutScore !== '' ? Number(away.shootoutScore) : null;
    return {
      id: `${stage}|${group || round}|${t1}|${t2}`,
      stage,
      date: ev.date || null,
      group,
      round,
      t1,
      t2,
      city,
      s1: home.score !== undefined && home.score !== null && home.score !== '' ? Number(home.score) : null,
      s2: away.score !== undefined && away.score !== null && away.score !== '' ? Number(away.score) : null,

// Parse ESPN's dedicated standings endpoint. Returns { standings, status } where
// status is a dict of team → 'FIRST'|'SECOND'|'WILDCARD'|'ELIMINATED' extracted from
// ESPN's note/clincher fields — the same signals ESPN uses to color teams green/red.
function parseESPNStandings(json) {
  const results = [];
  const status = {};
  const children = json && json.children || (json && json.standings && json.standings.entries ? [json] : []);
  (children.length ? children : [json]).forEach(groupNode => {
    const groupName = groupNode.name || groupNode.abbreviation || '';
    const lm = /Group\s+([A-L])\b/i.exec(groupName);
    const nm = /Group\s+(\d{1,2})\b/i.exec(groupName);
    const grpLetter = lm ? lm[1].toUpperCase() : nm ? GROUP_NUM_TO_LETTER[parseInt(nm[1])] || null : null;
    const entries = groupNode.standings && groupNode.standings.entries || groupNode.entries || [];
    entries.forEach((entry, pos) => {
      const teamName = normalizeTeam(entry.team && (entry.team.displayName || entry.team.shortDisplayName));
      if (!teamName) return;
      const stats = {};
      (entry.stats || []).forEach(s => {
        stats[s.name] = s.value;
      });

      // ESPN embeds advancement status in entry.note or entry.clincher
      const note = entry.note || entry.clincher || {};
      const noteText = ((note.text || note.description || note.shortText || '') + ' ' + (note.header || '')).toLowerCase();
      const noteColor = (note.color || note.type || '').toLowerCase();
      const noteRank = note.rank !== undefined ? note.rank : pos + 1;

      // Also check a direct "eliminated" or "qualified" boolean some ESPN endpoints expose
      const isQualified = entry.qualified === true || entry.advanced === true;
      const isElim = entry.eliminated === true;
      const textSaysQualified = /qualif|advance|knockout|clinch|round of 32/i.test(noteText);
      const textSaysWildcard = /wild.?card|third.?place.?quali|best third/i.test(noteText);
      const textSaysElim = /eliminat|out/i.test(noteText);
      const colorGreen = /green|#0a0|success/i.test(noteColor);
      const colorRed = /red|#a00|danger|error/i.test(noteColor);
      if (isElim || colorRed && !colorGreen || textSaysElim && !textSaysQualified) {
        status[teamName] = 'ELIMINATED';
      } else if (isQualified || colorGreen || textSaysQualified) {
        // Trust ESPN/FIFA green marker even if group isn't finished yet.
        // Use current standing position as proxy when rank is ambiguous.
        if (textSaysWildcard) {
          status[teamName] = 'WILDCARD';
        } else if (noteRank === 1 || pos === 0) {
          status[teamName] = 'FIRST';
        } else if (noteRank === 2 || pos === 1) {
          status[teamName] = 'SECOND';
        } else {
          status[teamName] = 'WILDCARD'; // 3rd place with green note = confirmed wildcard
        }
      }
      results.push({
        team: teamName,
        group: grpLetter || Object.entries(GROUPS).find(([, ts]) => ts.includes(teamName))?.[0] || null,
        mp: stats.gamesPlayed || stats.matchesPlayed || stats.played || 0,
        w: stats.wins || stats.w || 0,
        d: stats.ties || stats.draws || stats.d || 0,
        l: stats.losses || stats.l || 0,
        gf: stats.pointsFor || stats.goalsFor || stats.gf || 0,
        ga: stats.pointsAgainst || stats.goalsAgainst || stats.ga || 0,
        pts: stats.points || stats.pts || 0

    });
  });
  return {
    standings: results,
    status

}
function computeStandingsFromMatches(groupMatches) {
  const acc = {};
  ALL_TEAMS.forEach(t => {
    const group = Object.entries(GROUPS).find(([, ts]) => ts.includes(t))[0];
    acc[t] = {
      team: t,
      group,
      mp: 0,
      w: 0,
      d: 0,
      l: 0,
      gf: 0,
      ga: 0,
      pts: 0
    };
  });
  groupMatches.forEach(m => {
    if (!m.completed || m.s1 === null || m.s2 === null) return;
    if (!acc[m.t1] || !acc[m.t2]) return;
    acc[m.t1].mp++;
    acc[m.t2].mp++;
    acc[m.t1].gf += m.s1;
    acc[m.t1].ga += m.s2;
    acc[m.t2].gf += m.s2;
    acc[m.t2].ga += m.s1;
    if (m.s1 > m.s2) {
      acc[m.t1].w++;
      acc[m.t1].pts += 3;
      acc[m.t2].l++;
    } else if (m.s2 > m.s1) {
      acc[m.t2].w++;
      acc[m.t2].pts += 3;
      acc[m.t1].l++;
    } else {
      acc[m.t1].d++;
      acc[m.t1].pts++;
      acc[m.t2].d++;
      acc[m.t2].pts++;
    }
  });
  return Object.values(acc);
}

// ── Polymarket R32 odds (team-specific, not group-normalized) ─────────────
// Fetches each team's individual probability of reaching the Round of 32 from
// Polymarket's public Gamma API — the same data Neil Paine's odds tracker
// aggregates and presents in his Datawrapper chart.
// Each price is a raw 0-1 decimal; no normalization applied.
async function fetchPolymarketR32Odds() {
  // Primary: Polymarket's public Gamma API (CORS-enabled, no auth needed)
  const url = 'https://gamma-api.polymarket.com/events?slug=world-cup-team-to-advance-to-knockout-stages&limit=1';
  const resp = await fetch(url, {
    headers: {
      Accept: 'application/json'
    }
  });
  if (!resp.ok) throw new Error(`Gamma API ${resp.status}`);
  const data = await resp.json();
  const events = Array.isArray(data) ? data : data.data || [data];
  const event = events.find(e => e.markets && e.markets.length > 0) || events[0];
  if (!event?.markets?.length) throw new Error('No markets in Gamma response');
  const odds = {};
  (event.markets || []).forEach(m => {
    // groupItemTitle holds the team name, e.g. "Ecuador"
    const teamRaw = m.groupItemTitle || m.title || m.question || '';
    // outcomePrices is a JSON string like '["0.99","0.01"]'
    // outcomes is a JSON string like '["Yes","No"]'
    let yesPrice = null;
    try {
      const prices = JSON.parse(m.outcomePrices || '[]');
      const outcomes = JSON.parse(m.outcomes || '["Yes","No"]');
      const yesIdx = outcomes.findIndex(o => /yes/i.test(String(o)));
      yesPrice = parseFloat(prices[yesIdx >= 0 ? yesIdx : 0]);
    } catch {}
    // Fallback: some API versions expose bestBid/bestAsk directly
    if (isNaN(yesPrice) || yesPrice === null) yesPrice = parseFloat(m.lastTradePrice ?? m.midpoint ?? '');
    const team = normalizeTeam(teamRaw.trim());
    if (team && !isNaN(yesPrice)) odds[team] = Math.max(0, Math.min(1, yesPrice));
  });
  if (Object.keys(odds).length < 20) throw new Error(`Too few teams: ${Object.keys(odds).length}`);
  return odds;
}

// Fallback: Neil Paine's Datawrapper chart (uUdMb) embeds these same Polymarket
// odds as a CSV. Try multiple version numbers since the chart updates during the
// tournament (versions increment each time Neil publishes a new chart revision).
async function fetchNeilPaineOdds() {
  const chartId = 'uUdMb';
  // Try versions 4..20 in parallel; keep the highest-numbered one that succeeds
  const versionResults = await Promise.allSettled(Array.from({
    length: 17
  }, (_, i) => i + 4).map(v => fetch(`https://datawrapper.dwcdn.net/${chartId}/${v}/dataset.csv`).then(r => r.ok ? r.text().then(txt => ({
    v,
    txt
  })) : Promise.reject())));
  const best = versionResults.filter(r => r.status === 'fulfilled').map(r => r.value).sort((a, b) => b.v - a.v)[0];
  if (!best) throw new Error('All Datawrapper versions failed');
  const lines = best.txt.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
  const teamIdx = headers.findIndex(h => /^team$|^name$|^country$/.test(h));
  const r32Idx = headers.findIndex(h => /r32|round of 32|knockout|make r|advance/i.test(h));
  if (teamIdx === -1 || r32Idx === -1) throw new Error(`Columns not found: ${headers.join(',')}`);

    wcOdds = {};
  // Also find "Win WC" / "Win World Cup" column for WC win probabilities
  const wcIdx = headers.findIndex(h => /win.*(wc|world|cup|trophy)|champion/i.test(h));
  lines.slice(1).forEach(line => {
    const cols = line.split(',').map(c => c.replace(/"/g, '').trim());
    const team = normalizeTeam(cols[teamIdx]);
    if (!team) return;
    const rawR32 = parseFloat(cols[r32Idx]);
    if (!isNaN(rawR32)) r32Odds[team] = rawR32 > 1 ? rawR32 / 100 : rawR32;
    if (wcIdx >= 0) {
      const rawWC = parseFloat(cols[wcIdx]);
      if (!isNaN(rawWC)) wcOdds[team] = rawWC > 1 ? rawWC / 100 : rawWC;
    }
  });
  if (Object.keys(r32Odds).length < 20) throw new Error('Too few teams in CSV');
  return {
    r32Odds,
    wcOdds: Object.keys(wcOdds).length >= 20 ? wcOdds : null

}

// Try both Polymarket sources in parallel; update both R32 and WC odds.
// Returns { r32Odds, wcOdds } where each is { teamName: probability(0-1) } or null.

  // Try Neil Paine's Datawrapper CSV first (has both R32 and WC columns in one CSV)

async function fetchFromESPN() {
  // Fire all date-window scoreboard fetches + standings in parallel.
  // Each scoreboard window covers one chunk of the tournament schedule;
  // together they reconstruct the full 72-match group stage + knockouts.
  const requests = [fetch(ESPN_STANDINGS_URL).then(r => r.ok ? r.json() : null).catch(() => null), ...ESPN_DATE_WINDOWS.map(w => fetch(ESPN_BASE + w).then(r => r.ok ? r.json() : null).catch(() => null))];
  const [standingsJson, ...scoreboardJsons] = await Promise.all(requests);

  // Parse and deduplicate by event ID (multiple windows might overlap by a day)
  const matchMap = new Map();
  scoreboardJsons.forEach(json => {
    if (!json) return;
    parseESPNEvents(json).forEach(m => matchMap.set(m.id, m));
  });
  const matches = Array.from(matchMap.values());
  if (!matches.length) throw new Error('ESPN response had no events');

  // Use the standings API for authoritative pts/GD (it stays correct even for
  // groups that completed weeks ago). Fall back to computing from matches if needed.
  let standings,
    espnStatus = {};
  if (standingsJson) {
    try {
      const parsed = parseESPNStandings(standingsJson);
      standings = parsed.standings && parsed.standings.length >= 12 ? parsed.standings : computeStandingsFromMatches(matches.filter(m => m.stage === 'group'));
      espnStatus = parsed.status || {};
    } catch (e) {
      standings = computeStandingsFromMatches(matches.filter(m => m.stage === 'group'));
    }
  } else {
    standings = computeStandingsFromMatches(matches.filter(m => m.stage === 'group'));
  }

  // Fetch Polymarket R32 + WC odds in parallel with ESPN data
  const {
    r32Odds: polyR32,
    wcOdds: polyWC
  } = await fetchLiveOdds().catch(() => ({
    r32Odds: null,
    wcOdds: null
  }));
  if (polyWC) Object.assign(_wcOdds, polyWC);
  return {
    standings,
    matches,
    liveOdds: polyR32,
    liveStatus: espnStatus
  };
}

// Tries the direct, fast, free ESPN feed first (works when this page is hosted

// ── Error boundary — catches render crashes and shows the error ────────────
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = {
      error: null
    };
  }
  static getDerivedStateFromError(e) {
    return {
      error: e
    };
  }
  render() {
    if (this.state.error) {
      return React.createElement('div', {
        style: {

          background: '#fee',
          border: '2px solid #c00',
          borderRadius: 6,
          fontFamily: 'monospace',
          fontSize: 12,
          whiteSpace: 'pre-wrap'
        }
      }, '❌ Render error\n' + this.state.error.message + '\n\n' + (this.state.error.stack || ''));
    }
    return this.props.children;
  }
}
