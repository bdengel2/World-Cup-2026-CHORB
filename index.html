<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CHORB FIFA 2026</title>
<link rel="icon" type="image/png" href="./favicon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>html,body{margin:0;padding:0}*{box-sizing:border-box}</style>
</head>
<body>
<div id="root"></div>
<script>
if(!window.storage){var _m={};window.storage={
  get:function(k){return _m[k]!==undefined?Promise.resolve({key:k,value:_m[k]}):Promise.reject(new Error('nf'))},
  set:function(k,v){_m[k]=v;return Promise.resolve({key:k,value:v})},
  delete:function(k){delete _m[k];return Promise.resolve({key:k,deleted:true})},
  list:function(){return Promise.resolve({keys:Object.keys(_m)})}
}}
</script>
<script src="./app.js"></script>
</body>
</html>
