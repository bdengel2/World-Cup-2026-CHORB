<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CHORB FIFA 2026</title>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<style>
html, body { margin: 0; padding: 0; }
* { box-sizing: border-box; }
#status {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #F2F1EA; color: #8a8a80; font-family: monospace;
  font-size: 11px; padding: 6px 12px; border-top: 1px solid #DEDCD0;
  z-index: 9999;
}
</style>
</head>
<body>
<div id="root" style="font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:#F2F1EA;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#8a8a80;font-size:13px">
  Loading CHORB FIFA 2026…
</div>
<div id="status">Initializing…</div>

<script>
function setStatus(msg) {
  var el = document.getElementById('status');
  if (el) el.textContent = msg;
}

// Catch uncaught synchronous errors
window.onerror = function(msg, src, line, col, err) {
  document.getElementById('root').innerHTML =
    '<div style="font-family:monospace;padding:20px;color:#B23A2E;background:#F2F1EA;min-height:100vh">' +
    '<b>CHORB FIFA 2026 — error</b><br><br>' +
    (msg || (err && err.message) || 'Unknown error') +
    '<br><small style="color:#666">Source: ' + (src||'?') + ' line ' + (line||'?') + '</small>' +
    '<br><br><small>Open browser DevTools (F12 → Console) for details.</small></div>';
  setStatus('Error — see above');
  return false;
};

// Catch unhandled Promise rejections
window.addEventListener('unhandledrejection', function(e) {
  var msg = e.reason && e.reason.message ? e.reason.message : String(e.reason);
  window.onerror(msg, 'Promise', 0, 0, e.reason);
});

// Confirm CDN scripts loaded
setStatus('Checking React…');
if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
  window.onerror('React or ReactDOM failed to load from CDN. Check your internet connection.');
} else {
  setStatus('React ' + React.version + ' loaded — setting up storage…');
}
</script>

<script>
// window.storage shim for browsers (not Claude.ai artifact sandbox)
if (!window.storage) {
  var _mem = {};
  window.storage = {
    get: function(k) {
      return new Promise(function(resolve, reject) {
        if (_mem.hasOwnProperty(k)) resolve({ key: k, value: _mem[k] });
        else reject(new Error('not found'));
      });
    },
    set: function(k, v) { _mem[k] = String(v); return Promise.resolve({ key: k, value: _mem[k] }); },
    delete: function(k) { delete _mem[k]; return Promise.resolve({ key: k, deleted: true }); },
    list: function() { return Promise.resolve({ keys: Object.keys(_mem) }); }
  };
}
setStatus('Storage ready — loading app…');
</script>

<!-- App loaded as a separate file — avoids browser quirks with very large inline scripts -->
<script src="app.js"></script>

<script>
// Remove the status bar after React mounts (React will replace #root content)
setTimeout(function() {
  var status = document.getElementById('status');
  if (status) status.style.display = 'none';
}, 3000);
</script>
</body>
</html>
